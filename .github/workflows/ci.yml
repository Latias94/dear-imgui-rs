name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  # Reduce disk usage in CI (helps avoid "No space left on device" from LLVM/rustc).
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-Cdebuginfo=0"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libasound2-dev \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxi-dev libxcursor-dev libxfixes-dev libxss-dev libxxf86vm-dev libxtst-dev \
            libxkbcommon-dev libwayland-dev libudev-dev \
            mesa-common-dev libgl1-mesa-dev cmake

      - name: Install LLVM (libclang) for bindgen (Linux)
        if: runner.os == 'Linux'
        uses: KyleMayes/install-llvm-action@v1
        with:
          directory: ${{ runner.temp }}/llvm
          cached: true
          version: '14.0'

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew update
          # CMake is needed by various -sys crates; SDL3 is required by the
          # dear-imgui-sdl3 backend on macOS (we rely on system headers/libs
          # instead of building SDL3 from source here).
          brew install cmake sdl3

      - name: Install Windows deps
        if: runner.os == 'Windows'
        run: choco install -y llvm cmake

      - name: Build workspace (native)
        run: cargo build --workspace --exclude dear-imgui-examples --exclude dear-imgui-web-demo --exclude xtask
        env:
          # Prefer CMake path on Windows (auto-detects VS/SDK)
          IMGUI_SYS_USE_CMAKE: ${{ runner.os == 'Windows' && '1' || '' }}
          # Force building from source in CI for stability
          IMGUI_SYS_FORCE_BUILD: "1"
          IMPLOT_SYS_FORCE_BUILD: "1"
          IMNODES_SYS_FORCE_BUILD: "1"
          IMGUIZMO_SYS_FORCE_BUILD: "1"

      - name: Check dear-imgui-ash feature combos
        run: |
          cargo check -p dear-imgui-ash --lib --features "multi-viewport-winit,dynamic-rendering"
          cargo check -p dear-imgui-ash --lib --features "multi-viewport-sdl3,dynamic-rendering"

      - name: Build dear-app with all add-ons
        run: cargo build -p dear-app --features "implot imnodes implot3d"

      - name: Build examples (all extensions)
        run: cargo build -p dear-imgui-examples --features "imguizmo imnodes implot reflect implot3d imguizmo-quat"

      - name: Build examples (test-engine)
        run: cargo build -p dear-imgui-examples --features "test-engine" --bin imgui_test_engine_basic

      - name: Check test-engine (no capture)
        run: cargo check -p dear-imgui-test-engine --no-default-features

  windows-gnu:
    name: Windows GNU link check
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM (libclang) for bindgen (Windows)
        run: choco install -y llvm

      - name: Setup MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-toolchain

      - name: Add MinGW64 to PATH
        shell: powershell
        run: |
          $root = '${{ steps.msys2.outputs.msys2-location }}'
          $mingw = Join-Path $root 'mingw64\bin'
          echo $mingw >> $env:GITHUB_PATH
          echo "MINGW_BIN=$mingw" >> $env:GITHUB_ENV

      - name: Add windows-gnu target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Cargo test (no-run) - dear-imgui-sys (windows-gnu)
        run: cargo test -p dear-imgui-sys --target x86_64-pc-windows-gnu --no-run
        env:
          # Validate MinGW/GNU link flags (e.g. shell32) via an actual link step.
          IMGUI_SYS_FORCE_BUILD: "1"
          # Pin tool paths based on MSYS2 install location (varies: D:\a\_temp\msys64 or C:\msys64).
          # Use the mingw64 environment tools (gcc/g++/ar) which target x86_64-w64-mingw32.
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: '${{ env.MINGW_BIN }}\gcc.exe'
          CC_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\gcc.exe'
          CXX_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\g++.exe'
          AR_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\ar.exe'

  ffi-cross-check:
    name: FFI signedness check (armv7)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM (libclang) for bindgen
        uses: KyleMayes/install-llvm-action@v1
        with:
          directory: ${{ runner.temp }}/llvm
          cached: true
          version: '14.0'

      - name: Add armv7 target
        run: rustup target add armv7-unknown-linux-gnueabihf

      - name: Cargo check (armv7)
        run: cargo check -p dear-imgui-rs -p dear-implot -p dear-imnodes --target armv7-unknown-linux-gnueabihf
        env:
          # This job is a type-check sentinel for `c_char` signedness (u8 vs i8).
          # We don't need to link any native C/C++ code here, so skip cc/cmake builds.
          IMGUI_SYS_SKIP_CC: "1"
          IMPLOT_SYS_SKIP_CC: "1"
          IMNODES_SYS_SKIP_CC: "1"

  apple-mobile-check:
    name: Apple mobile compile check (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Add iOS targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: Install macOS deps
        run: |
          brew update
          brew install sdl3

      - name: Cargo check (iOS device)
        run: cargo check -p dear-imgui-rs -p dear-imgui-winit -p dear-imgui-wgpu --lib --target aarch64-apple-ios
        env:
          # This is a compile-target sentinel only. Skip native C/C++ builds so
          # the job validates Rust target support rather than cross-linker setup.
          IMGUI_SYS_SKIP_CC: "1"

      - name: Cargo check (iOS simulator)
        run: cargo check -p dear-imgui-rs -p dear-imgui-winit -p dear-imgui-wgpu --lib --target aarch64-apple-ios-sim
        env:
          IMGUI_SYS_SKIP_CC: "1"

      - name: Cargo check (iOS smoke example, simulator)
        run: cargo check --manifest-path examples-ios/dear-imgui-ios-smoke/Cargo.toml --lib --target aarch64-apple-ios-sim
        env:
          IMGUI_SYS_SKIP_CC: "1"

      - name: Cargo check (SDL3 backend, iOS device)
        run: cargo check -p dear-imgui-sdl3 --lib --target aarch64-apple-ios

      - name: Cargo check (SDL3 iOS smoke, device)
        run: cargo check --manifest-path examples-ios/dear-imgui-ios-sdl3-smoke/Cargo.toml --lib --target aarch64-apple-ios

      - name: Cargo check (SDL3 iOS smoke, simulator)
        run: cargo check --manifest-path examples-ios/dear-imgui-ios-sdl3-smoke/Cargo.toml --lib --target aarch64-apple-ios-sim

  publish-check:
    name: Package check (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo package (selected crates)
        shell: bash
        run: |
          set -euo pipefail
          # Package the helper crate first because published -sys crates depend on it.
          echo "::group::package dear-imgui-build-support"
          cargo package -p dear-imgui-build-support
          echo "::endgroup::"

          # Then inspect the root -sys crate package file list. A full `cargo package`
          # for dear-imgui-sys resolves the stripped manifest against crates.io, which
          # will fail before release until dear-imgui-build-support has been published
          # and indexed. `--list` still validates the package contents/excludes without
          # requiring the helper crate to exist on crates.io yet.
          echo "::group::package dear-imgui-sys (list)"
          cargo package -p dear-imgui-sys --list
          echo "::endgroup::"

          # Note: other -sys crates depend on dear-imgui-sys by version and will fail
          # packaging until dear-imgui-sys is published. We keep their packaging disabled
          # here to avoid false CI failures pre-release.

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  wasm-check:
    name: WASM bindings (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM (libclang) for bindgen
        uses: KyleMayes/install-llvm-action@v1
        with:
          directory: ${{ runner.temp }}/llvm
          cached: true
          version: '14.0'

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Generate pregenerated WASM bindings for dear-imgui-sys
        run: cargo run -p xtask -- wasm-bindgen imgui-sys-v0

      - name: Generate WASM bindings for extensions (ImPlot/ImPlot3D/ImNodes/ImGuizmo/ImGuIZMO.quat)
        run: |
          cargo run -p xtask -- wasm-bindgen-implot imgui-sys-v0
          cargo run -p xtask -- wasm-bindgen-implot3d imgui-sys-v0
          cargo run -p xtask -- wasm-bindgen-imnodes imgui-sys-v0
          cargo run -p xtask -- wasm-bindgen-imguizmo imgui-sys-v0
          cargo run -p xtask -- wasm-bindgen-imguizmo-quat imgui-sys-v0

      - name: Build web demo crate for wasm32-unknown-unknown (core + extensions)
        run: cargo build -p dear-imgui-web-demo --target wasm32-unknown-unknown --no-default-features --features "web-backends,implot,implot3d,imnodes,imguizmo,imguizmo-quat"
