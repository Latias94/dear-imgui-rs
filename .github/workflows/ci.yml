name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  # Reduce disk usage in CI (helps avoid "No space left on device" from LLVM/rustc).
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-Cdebuginfo=0"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libasound2-dev \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxi-dev libxcursor-dev libxfixes-dev libxss-dev libxxf86vm-dev libxtst-dev \
            libxkbcommon-dev libwayland-dev libudev-dev \
            mesa-common-dev libgl1-mesa-dev cmake

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew update
          # CMake is needed by various -sys crates; SDL3 is required by the
          # dear-imgui-sdl3 backend on macOS (we rely on system headers/libs
          # instead of building SDL3 from source here).
          brew install cmake sdl3

      - name: Install Windows deps
        if: runner.os == 'Windows'
        run: choco install -y cmake

      - name: Build workspace (native)
        run: cargo build --workspace --exclude dear-imgui-examples --exclude dear-imgui-web-demo --exclude xtask
        env:
          # Prefer CMake path on Windows (auto-detects VS/SDK)
          IMGUI_SYS_USE_CMAKE: ${{ runner.os == 'Windows' && '1' || '' }}
          # Force building from source in CI for stability
          IMGUI_SYS_FORCE_BUILD: "1"
          IMPLOT_SYS_FORCE_BUILD: "1"
          IMNODES_SYS_FORCE_BUILD: "1"
          NODE_EDITOR_SYS_FORCE_BUILD: "1"
          IMGUIZMO_SYS_FORCE_BUILD: "1"

      - name: Check renderer backend feature combos
        run: |
          cargo check -p dear-imgui-glow --lib --features "multi-viewport"
          cargo check -p dear-imgui-wgpu --lib --features "multi-viewport-winit"
          cargo check -p dear-imgui-wgpu --lib --features "multi-viewport-sdl3"
          cargo check -p dear-imgui-ash --lib --features "multi-viewport-winit,dynamic-rendering"
          cargo check -p dear-imgui-ash --lib --features "multi-viewport-sdl3,dynamic-rendering"

      - name: Run renderer backend focused tests
        run: |
          cargo test -p dear-imgui-wgpu --lib --features "multi-viewport-winit" renderer_destroy_window_ignores_foreign_renderer_user_data
          cargo test -p dear-imgui-wgpu --lib --features "multi-viewport-sdl3" renderer_destroy_window_ignores_foreign_renderer_user_data
          cargo test -p dear-imgui-ash --lib --features "multi-viewport-sdl3,dynamic-rendering" take_viewport_data_ignores_foreign_renderer_user_data
          cargo test -p dear-imgui-ash --lib --features "multi-viewport-sdl3,dynamic-rendering" viewport_user_data_mut_ignores_unregistered_renderer_user_data

      - name: Check dear-imgui-rs multi-viewport tests compile
        run: cargo test -p dear-imgui-rs --features multi-viewport --no-run

      - name: Run winit backend focused tests
        run: |
          cargo test -p dear-imgui-winit --lib --no-default-features ime_window_ptr_falls_back_to_platform_ime_user_data
          cargo test -p dear-imgui-winit --lib --features "multi-viewport" window_ptr_for_viewport

      - name: Build dear-app with all add-ons
        run: cargo build -p dear-app --features "implot imnodes implot3d"

      - name: Build examples (all extensions)
        run: cargo build -p dear-imgui-examples --features "imguizmo imnodes node-editor implot reflect implot3d imguizmo-quat"

      - name: Check multi-viewport examples
        run: |
          cargo check -p dear-imgui-examples --features "multi-viewport" --bin multi_viewport_wgpu --bin multi_viewport_ash
          cargo check -p dear-imgui-examples --features "multi-viewport sdl3-platform" --bin sdl3_glow_multi_viewport
          cargo check -p dear-imgui-examples --features "multi-viewport sdl3-opengl3" --bin sdl3_opengl_multi_viewport
          cargo check -p dear-imgui-examples --features "sdl3-wgpu-multi-viewport" --bin sdl3_wgpu_multi_viewport
          cargo check -p dear-imgui-examples --features "sdl3-ash-multi-viewport" --bin sdl3_ash_multi_viewport

      - name: Check SDL3 renderer examples
        run: |
          cargo check -p dear-imgui-examples --features "sdl3-platform" --bin sdl3_wgpu
          cargo check -p dear-imgui-examples --features "sdl3-sdlrenderer3" --bin sdl3_sdlrenderer

      - name: Build examples (test-engine)
        run: cargo build -p dear-imgui-examples --features "test-engine" --bin imgui_test_engine_basic

      - name: Check test-engine (no capture)
        run: cargo check -p dear-imgui-test-engine --no-default-features

  bevy-backend:
    name: Bevy backend gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libasound2-dev \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxi-dev libxcursor-dev libxfixes-dev libxss-dev libxxf86vm-dev libxtst-dev \
            libxkbcommon-dev libwayland-dev libudev-dev \
            mesa-common-dev libgl1-mesa-dev cmake

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Check formatting
        run: cargo +stable fmt --all --check

      - name: Check Bevy backend core example
        run: cargo +stable check -p dear-imgui-bevy --example simple --no-default-features

      - name: Check Bevy backend examples
        run: cargo +stable check -p dear-imgui-bevy --examples --features render

      - name: Check Bevy backend multi-viewport examples
        run: cargo +stable check -p dear-imgui-bevy --examples --features render,multi-viewport

      - name: Check Bevy backend ecosystem examples
        run: |
          cargo +stable check -p dear-imgui-bevy --example ecosystem --features ecosystem
          cargo +stable check -p dear-imgui-bevy --example bevy_plot_controls --features render,implot

      - name: Check Bevy backend docs
        run: cargo +stable doc -p dear-imgui-bevy --no-deps --features render,multi-viewport,ecosystem
        env:
          DOCS_RS: "1"
          RUSTDOCFLAGS: "-D warnings"

      - name: Run Bevy backend core tests
        run: cargo +stable nextest run -p dear-imgui-bevy --no-default-features --lib --test helpers --test input --test lifecycle --test plugin

      - name: Run Bevy backend tests
        run: cargo +stable nextest run -p dear-imgui-bevy --features render

      - name: Check Bevy backend native multi-viewport platform bridge
        run: cargo +stable check -p dear-imgui-bevy --features multi-viewport

      - name: Run Bevy backend native multi-viewport platform bridge tests
        run: cargo +stable nextest run -p dear-imgui-bevy --features multi-viewport --test viewport

      - name: Check Bevy backend native multi-viewport
        run: cargo +stable check -p dear-imgui-bevy --features render,multi-viewport

      - name: Run Bevy backend native multi-viewport tests
        run: cargo +stable nextest run -p dear-imgui-bevy --features render,multi-viewport

      - name: Check Bevy backend wasm (core)
        run: cargo +stable check -p dear-imgui-bevy --target wasm32-unknown-unknown --no-default-features

      - name: Check Bevy backend wasm (render)
        run: cargo +stable check -p dear-imgui-bevy --target wasm32-unknown-unknown --features render

  sys-bindgen-defaults:
    name: Sys crates without bindgen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Assert default sys crates do not pull bindgen
        shell: bash
        run: |
          set -euo pipefail

          crates=(
            dear-imgui-sys
            dear-implot-sys
            dear-imnodes-sys
            dear-node-editor-sys
            dear-implot3d-sys
            dear-imguizmo-sys
            dear-imguizmo-quat-sys
            dear-imgui-test-engine-sys
          )

          for crate in "${crates[@]}"; do
            for dep in bindgen clang-sys; do
              out="$(mktemp)"
              if cargo tree -p "$crate" --target all -i "$dep" >"$out" 2>&1; then
                cat "$out"
                echo "::error::$crate unexpectedly depends on $dep by default"
                exit 1
              fi
              if ! grep -q "did not match any packages" "$out"; then
                cat "$out"
                echo "::error::cargo tree failed unexpectedly while checking $crate for $dep"
                exit 1
              fi
            done
          done

      - name: Check sys crates without libclang or native C/C++
        shell: bash
        env:
          LIBCLANG_PATH: ${{ github.workspace }}/ci-missing-libclang
          IMGUI_SYS_SKIP_CC: "1"
          IMPLOT_SYS_SKIP_CC: "1"
          IMNODES_SYS_SKIP_CC: "1"
          NODE_EDITOR_SYS_SKIP_CC: "1"
          IMPLOT3D_SYS_SKIP_CC: "1"
          IMGUIZMO_SYS_SKIP_CC: "1"
          IMGUIZMO_QUAT_SYS_SKIP_CC: "1"
          IMGUI_TEST_ENGINE_SYS_SKIP_CC: "1"
        run: |
          set -euo pipefail
          cargo check \
            -p dear-imgui-sys \
            -p dear-implot-sys \
            -p dear-imnodes-sys \
            -p dear-node-editor-sys \
            -p dear-implot3d-sys \
            -p dear-imguizmo-sys \
            -p dear-imguizmo-quat-sys \
            -p dear-imgui-test-engine-sys

      - name: Assert regeneration requires bindgen feature
        shell: bash
        env:
          LIBCLANG_PATH: ${{ github.workspace }}/ci-missing-libclang
          DEAR_IMGUI_RS_REGEN_BINDINGS: "1"
        run: |
          set -euo pipefail
          set +e
          cargo check -p dear-imgui-sys >regen-without-bindgen.log 2>&1
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            cat regen-without-bindgen.log
            echo "::error::binding regeneration unexpectedly succeeded without the bindgen feature"
            exit 1
          fi
          grep -F 'regenerating bindings requires the `bindgen` feature' regen-without-bindgen.log
          grep -F -- '--features bindgen' regen-without-bindgen.log

  windows-gnu:
    name: Windows GNU link check
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Setup MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-toolchain

      - name: Add MinGW64 to PATH
        shell: powershell
        run: |
          $root = '${{ steps.msys2.outputs.msys2-location }}'
          $mingw = Join-Path $root 'mingw64\bin'
          echo $mingw >> $env:GITHUB_PATH
          echo "MINGW_BIN=$mingw" >> $env:GITHUB_ENV

      - name: Add windows-gnu target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Cargo test (no-run) - dear-imgui-sys (windows-gnu)
        run: cargo test -p dear-imgui-sys --target x86_64-pc-windows-gnu --no-run
        env:
          # Validate MinGW/GNU link flags (e.g. shell32) via an actual link step.
          IMGUI_SYS_FORCE_BUILD: "1"
          # Pin tool paths based on MSYS2 install location (varies: D:\a\_temp\msys64 or C:\msys64).
          # Use the mingw64 environment tools (gcc/g++/ar) which target x86_64-w64-mingw32.
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: '${{ env.MINGW_BIN }}\gcc.exe'
          CC_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\gcc.exe'
          CXX_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\g++.exe'
          AR_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\ar.exe'

  ffi-cross-check:
    name: FFI signedness check (armv7)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Add armv7 target
        run: rustup target add armv7-unknown-linux-gnueabihf

      - name: Cargo check (armv7)
        run: cargo check -p dear-imgui-rs -p dear-implot -p dear-imnodes -p dear-node-editor --target armv7-unknown-linux-gnueabihf
        env:
          # This job is a type-check sentinel for `c_char` signedness (u8 vs i8).
          # We don't need to link any native C/C++ code here, so skip cc/cmake builds.
          IMGUI_SYS_SKIP_CC: "1"
          IMPLOT_SYS_SKIP_CC: "1"
          IMNODES_SYS_SKIP_CC: "1"
          NODE_EDITOR_SYS_SKIP_CC: "1"

  apple-mobile-check:
    name: Apple mobile compile check (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Add iOS targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: Install macOS deps
        run: |
          brew update
          brew install sdl3

      - name: Cargo check (iOS device)
        run: cargo check -p dear-imgui-rs -p dear-imgui-winit -p dear-imgui-wgpu --lib --target aarch64-apple-ios
        env:
          # This is a compile-target sentinel only. Skip native C/C++ builds so
          # the job validates Rust target support rather than cross-linker setup.
          IMGUI_SYS_SKIP_CC: "1"

      - name: Cargo check (iOS simulator)
        run: cargo check -p dear-imgui-rs -p dear-imgui-winit -p dear-imgui-wgpu --lib --target aarch64-apple-ios-sim
        env:
          IMGUI_SYS_SKIP_CC: "1"

      - name: Cargo check (iOS smoke example, simulator)
        run: cargo check --manifest-path examples-ios/dear-imgui-ios-smoke/Cargo.toml --lib --target aarch64-apple-ios-sim
        env:
          IMGUI_SYS_SKIP_CC: "1"

      - name: Cargo check (SDL3 backend, iOS device)
        run: cargo check -p dear-imgui-sdl3 --lib --target aarch64-apple-ios

      - name: Cargo check (SDL3 iOS smoke, device)
        run: cargo check --manifest-path examples-ios/dear-imgui-ios-sdl3-smoke/Cargo.toml --lib --target aarch64-apple-ios

      - name: Cargo check (SDL3 iOS smoke, simulator)
        run: cargo check --manifest-path examples-ios/dear-imgui-ios-sdl3-smoke/Cargo.toml --lib --target aarch64-apple-ios-sim

  publish-check:
    name: Package check (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo package (selected crates)
        shell: bash
        run: |
          set -euo pipefail
          # Package the helper crate first because published -sys crates depend on it.
          echo "::group::package dear-imgui-build-support"
          cargo package -p dear-imgui-build-support
          echo "::endgroup::"

          # Then inspect the root -sys crate package file list. A full `cargo package`
          # for dear-imgui-sys resolves the stripped manifest against crates.io, which
          # will fail before release until dear-imgui-build-support has been published
          # and indexed. `--list` still validates the package contents/excludes without
          # requiring the helper crate to exist on crates.io yet.
          echo "::group::package dear-imgui-sys (list)"
          cargo package -p dear-imgui-sys --list
          echo "::endgroup::"

          # Note: other -sys crates depend on dear-imgui-sys by version and will fail
          # packaging until dear-imgui-sys is published. We keep their packaging disabled
          # here to avoid false CI failures pre-release.

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  wasm-check:
    name: WASM bindings (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Init required nested submodules (selective)
        shell: bash
        run: bash tools/ci/update_submodules.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install LLVM (libclang) for bindgen
        uses: KyleMayes/install-llvm-action@v1
        with:
          directory: ${{ runner.temp }}/llvm
          cached: true
          version: '14.0'

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Generate pregenerated WASM bindings for dear-imgui-sys
        run: cargo run -p xtask -- wasm-bindgen imgui-sys-v0

      - name: Generate WASM bindings for extensions (ImPlot/ImPlot3D/ImNodes/ImGuizmo/ImGuIZMO.quat)
        run: |
          cargo run -p xtask -- wasm-bindgen-implot imgui-sys-v0
          cargo run -p xtask -- wasm-bindgen-implot3d imgui-sys-v0
          cargo run -p xtask -- wasm-bindgen-imnodes imgui-sys-v0
          cargo run -p xtask -- wasm-bindgen-imguizmo imgui-sys-v0
          cargo run -p xtask -- wasm-bindgen-imguizmo-quat imgui-sys-v0

      - name: Build web demo crate for wasm32-unknown-unknown (core + extensions)
        run: cargo build -p dear-imgui-web-demo --target wasm32-unknown-unknown --no-default-features --features "web-backends,implot,implot3d,imnodes,imguizmo,imguizmo-quat"
