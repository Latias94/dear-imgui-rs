[package]
name = "dear-node-editor"
version = "0.14.1"
edition.workspace = true
description = "Safe Rust bindings for imgui-node-editor for Dear ImGui"
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
categories.workspace = true
keywords.workspace = true

[dependencies]
dear-imgui-rs = { path = "../../dear-imgui", version = "0.14" }
dear-node-editor-sys = { path = "../dear-node-editor-sys", version = "0.14" }
bitflags.workspace = true
thiserror.workspace = true

[features]
default = []
freetype = ["dear-imgui-rs/freetype", "dear-node-editor-sys/freetype"]

[dev-dependencies]
static_assertions = "1.1"
